  - name: f5networks.f5_bigip
    # Newer collection preferred per CLAUDE.md conventions. 3.x covers the
    # DO/AS3 orchestration helpers used from Phase 2 onward.
    version: "3.13.0"

  - name: ansible.utils
    version: ">=4.0.0,<5.0.0"

  - name: community.general
    version: ">=9.0.0,<10.0.0"
