---
# Phase 1 inventory: 5 mock devices, one container each, distinct localhost
# ports. Phase 3 will collapse to a multiplexed endpoint with per-device Host
# headers — see docs/decisions/001-mock-topology.md.
all:
  vars:
    ansible_connection: local
  children:
    lab:
      hosts:
        bigip-lab-01:
          f5_api_base_url: "http://localhost:8101"
        bigip-lab-02:
          f5_api_base_url: "http://localhost:8102"
        bigip-lab-03:
          f5_api_base_url: "http://localhost:8103"
        bigip-lab-04:
          f5_api_base_url: "http://localhost:8104"
        bigip-lab-05:
          f5_api_base_url: "http://localhost:8105"
