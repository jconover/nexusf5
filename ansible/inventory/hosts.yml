---
# Phase 3 inventory: 50 mock devices behind the multiplexed mock-f5
# container. Hostname is the first path segment of the URL — see
# docs/decisions/001-mock-topology.md. The per-host f5_api_base_url
# template lives in group_vars/all.yml so hosts.yml stays pure topology.
#
# Wave membership is enforced by tests/test_wave_membership.py (a host must
# appear in exactly one of canary / wave_1 / wave_2 / wave_3).
all:
  vars:
    ansible_connection: local
  children:
    lab:
      children:
        canary: {}
        wave_1: {}
        wave_2: {}
        wave_3: {}
    canary:
