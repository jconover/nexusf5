---
# f5_backup — save a UCS backup to the device's local store.
#
# Phase 2 scope: invoke the UCS save via iControl REST. Remote-destination
# offload (S3 or equivalent) lives in Phase 4 when the integration lane
# needs persistent artifacts across ephemeral VE instances.

- name: Backup | derive UCS filename
  ansible.builtin.set_fact:
    f5_backup_ucs_name: "{{ f5_backup_ucs_name | default('nexusf5-' + inventory_hostname + '-' + now(fmt='%Y%m%dT%H%M%S') + '.ucs', true) }}"
  tags: [backup, always]

- name: Backup | save UCS
  # raw-icontrol-rest
  # POST /mgmt/tm/sys/ucs
  ansible.builtin.uri:
    url: "{{ f5_api_base_url }}/mgmt/tm/sys/ucs"
    method: POST
    user: "{{ f5_api_user }}"
    password: "{{ f5_api_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs }}"
    body_format: json
    body:
      command: save
      name: "{{ f5_backup_ucs_name }}"
    timeout: "{{ f5_api_timeout }}"
  register: f5_backup_response
  tags: [backup]

- name: Backup | summarise
  ansible.builtin.debug:
    msg: "UCS saved as {{ f5_backup_ucs_name }} on {{ inventory_hostname }}"
  tags: [backup]
