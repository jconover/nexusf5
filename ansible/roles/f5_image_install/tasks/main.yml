---
# f5_image_install — install target TMOS image to the inactive volume.
#
# Shape of the flow:
#   1. POST /mgmt/tm/sys/software/image to register the image name.
#   2. POST /mgmt/tm/sys/software/volume with command=install to kick off
#      the async install to the inactive volume.
#   3. Poll GET /mgmt/tm/sys/software/volume/{volume} until status is
#      "complete" or "failed", bounded by f5_image_install_poll_retries *
#      f5_image_install_poll_delay.
# On failure or timeout, the task stops with a message pointing operators
# at runbooks/02-image-install-stuck.md.

- name: Install | discover inactive volume
  # raw-icontrol-rest
  # GET /mgmt/tm/sys/software/volume
  ansible.builtin.uri:
    url: "{{ f5_api_base_url }}/mgmt/tm/sys/software/volume"
    method: GET
    user: "{{ f5_api_user }}"
    password: "{{ f5_api_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs }}"
    return_content: true
    timeout: "{{ f5_api_timeout }}"
  register: f5_image_install_volumes
  tags: [install]

- name: Install | pick inactive volume as install target
  ansible.builtin.set_fact:
    f5_image_install_target_volume: >-
      {{ (f5_image_install_volumes.json['items'] | rejectattr('active', 'equalto', true) | list | first).name }}
  tags: [install]

- name: Install | register target image
  # raw-icontrol-rest
  # POST /mgmt/tm/sys/software/image
  ansible.builtin.uri:
    url: "{{ f5_api_base_url }}/mgmt/tm/sys/software/image"
    method: POST
    user: "{{ f5_api_user }}"
    password: "{{ f5_api_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs }}"
    body_format: json
    body:
      command: install
      name: "{{ f5_target_image_name }}"
    timeout: "{{ f5_api_timeout }}"
  tags: [install]

- name: Install | kick off install to inactive volume
  # raw-icontrol-rest
  # POST /mgmt/tm/sys/software/volume
  ansible.builtin.uri:
    url: "{{ f5_api_base_url }}/mgmt/tm/sys/software/volume"
    method: POST
    user: "{{ f5_api_user }}"
    password: "{{ f5_api_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs }}"
    body_format: json
    body:
      command: install
      name: "{{ f5_image_install_target_volume }}"
      version: "{{ f5_target_version }}"
    timeout: "{{ f5_api_timeout }}"
  register: f5_image_install_start
  tags: [install]

- name: Install | poll until complete or failed
  # raw-icontrol-rest
  # GET /mgmt/tm/sys/software/volume/{volume}
  ansible.builtin.uri:
    url: "{{ f5_api_base_url }}/mgmt/tm/sys/software/volume/{{ f5_image_install_target_volume }}"
    method: GET
    user: "{{ f5_api_user }}"
    password: "{{ f5_api_password }}"
    force_basic_auth: true
    validate_certs: "{{ f5_validate_certs }}"
    return_content: true
    timeout: "{{ f5_api_timeout }}"
  register: f5_image_install_poll
  until: f5_image_install_poll.json.status in ['complete', 'failed']
  retries: "{{ f5_image_install_poll_retries }}"
  delay: "{{ f5_image_install_poll_delay }}"
  tags: [install]

- name: Install | assert install did not fail
  ansible.builtin.assert:
    that:
      - f5_image_install_poll.json.status == 'complete'
    fail_msg: >-
      Install to {{ f5_image_install_target_volume }} on {{ inventory_hostname }}
      ended with status={{ f5_image_install_poll.json.status }}.
      See runbooks/02-image-install-stuck.md
    success_msg: >-
      Install to {{ f5_image_install_target_volume }} complete at version
      {{ f5_image_install_poll.json.version }}
  tags: [install]
