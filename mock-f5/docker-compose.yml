---
# Phase 3 topology: one container multiplexing 50 devices, routed by the
# hostname path prefix. See docs/decisions/001-mock-topology.md.
#
# Override the manifest path with MOCK_F5_MANIFEST at compose time to point
# at a different device list (e.g. a 500-device stress manifest).

services:
  mock-f5:
    image: nexusf5-mock:dev
    build:
      context: .
      args:
        # UV_VERSION is sourced from repo-root .tool-versions via the
        # Makefile. Running `docker compose build` outside Make fails
        # loudly here — there is no default, on purpose.
        UV_VERSION: ${UV_VERSION:?UV_VERSION must be exported — run via make mock-build / mock-up}
    container_name: nexusf5-mock
    restart: unless-stopped
    environment:
      # Fast timings by default so `make test` stays snappy. Override with
      # `MOCK_INSTALL_SECONDS=900 docker compose up` for timeout scenarios.
      MOCK_INSTALL_SECONDS: "5"
      MOCK_REBOOT_SECONDS: "5"
      MOCK_F5_MANIFEST: /app/manifests/lab-50.json
    volumes:
      - ./manifests:/app/manifests:ro
    ports:
      # 8100 (vs Phase 1/2's per-device 8101–8105) makes it unambiguous
      # which topology is running when both are in local caches.
      - "8100:8080"

  # Per-device adapter that gives each canary device a dedicated port for the
  # F5 Terraform provider, which has no path-prefix support. See proxy/README.md.
  mock-f5-proxy:
    image: nexusf5-mock-proxy:dev
    build:
      context: ./proxy
    container_name: nexusf5-mock-proxy
    restart: unless-stopped
    depends_on:
      mock-f5:
        condition: service_healthy
    ports:
      - "8101-8105:8101-8105"
    volumes:
      - ./manifests:/manifests:ro
