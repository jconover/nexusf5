---
# Phase 1 topology: one container per device. See docs/decisions/001-mock-topology.md.

x-mock-template: &mock-template
  image: nexusf5-mock:dev
  build:
    context: .
  restart: unless-stopped

services:
  bigip-lab-01:
    <<: *mock-template
    container_name: bigip-lab-01
    environment:
      MOCK_F5_HOSTNAME: bigip-lab-01
      MOCK_F5_VERSION: 16.1.3
    ports:
      - "8101:8080"

  bigip-lab-02:
    <<: *mock-template
    container_name: bigip-lab-02
    environment:
      MOCK_F5_HOSTNAME: bigip-lab-02
      MOCK_F5_VERSION: 16.1.3
    ports:
      - "8102:8080"

  bigip-lab-03:
    <<: *mock-template
    container_name: bigip-lab-03
    environment:
      MOCK_F5_HOSTNAME: bigip-lab-03
      MOCK_F5_VERSION: 16.1.3
    ports:
      - "8103:8080"

  bigip-lab-04:
    <<: *mock-template
    container_name: bigip-lab-04
    environment:
      MOCK_F5_HOSTNAME: bigip-lab-04
      MOCK_F5_VERSION: 16.1.3
    ports:
      - "8104:8080"

  bigip-lab-05:
